services:
  postgres:
    image: postgres:17-alpine
    container_name: saferskills-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: saferskills_dev
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saferskills_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: saferskills-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:dev@postgres:5432/saferskills_dev
      SENTRY_DSN: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      GIT_SHA: dev
      VERSION: 0.0.0-foundation
      # Phase B scan engine reads detector specs from rubric/ at startup.
      # In source-checkout layout the engine auto-discovers from the monorepo
      # root; in Docker the rubric tree is mounted read-only since it lives
      # outside the api build context (./services/api).
      RUBRIC_DIR: /app/rubric
    volumes:
      - ./rubric:/app/rubric:ro
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: saferskills-webapp
    depends_on: [api]
    environment:
      PUBLIC_API_URL: http://api:8000
    ports: ["5173:5173"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:5173/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5

  # Opt-in: docker compose --profile ladle up — http://localhost:61000
  ladle:
    profiles: [ladle]
    image: node:24-alpine
    container_name: saferskills-ladle
    working_dir: /app/ui
    environment:
      # Gates `hmrHost: ''` in `.ladle/config.mjs` so Vite's HMR WS binds to 0.0.0.0
      # (host port-forward needs this; on host runs the var is unset, HMR uses defaults).
      LADLE_DOCKER: "1"
    # Pin pnpm 10 — pnpm 11 dropped reading `pnpm.onlyBuiltDependencies`
    # from package.json (moved to pnpm-workspace.yaml only).
    command: sh -c "corepack enable && corepack prepare pnpm@10.18.0 --activate && pnpm install --node-linker=hoisted && pnpm ladle:dev --host 0.0.0.0"
    volumes:
      - ./ui:/app/ui
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - ladle_node_modules:/app/ui/node_modules
    # 61000 = Ladle dev server, 24678 = Vite HMR websocket.
    ports: ["${LADLE_PORT:-61000}:61000", "24678:24678"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:61000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

volumes:
  pgdata:
  ladle_node_modules:
