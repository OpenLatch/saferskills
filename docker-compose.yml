services:
  postgres:
    image: postgres:17-alpine
    container_name: saferskills-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: saferskills_dev
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saferskills_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: saferskills-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:dev@postgres:5432/saferskills_dev
      SENTRY_DSN: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      GIT_SHA: dev
      VERSION: 0.0.0-foundation
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: saferskills-webapp
    depends_on: [api]
    environment:
      PUBLIC_API_URL: http://api:8000
    ports: ["5173:80"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
