services:
  postgres:
    image: postgres:17-alpine
    container_name: saferskills-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: saferskills_dev
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saferskills_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      # Repo-root context (not ./services/api) so the Dockerfile can COPY the
      # repo-root rubric/ tree the scan engine loads at runtime. Dockerfile paths
      # are repo-root-relative (services/api/… + rubric/).
      context: .
      dockerfile: services/api/Dockerfile
    container_name: saferskills-api
    depends_on:
      postgres:
        condition: service_healthy
    # GitHub App credentials (GITHUB_APP_ID / _INSTALLATION_ID / _PRIVATE_KEY) live
    # in services/api/.env — load them so ingestion + auto-scan authenticate at
    # 5,000 req/h instead of the 60 req/h anonymous limit. The file has no
    # DATABASE_URL, and the explicit `environment:` block below overrides any
    # overlap, so this can't clobber the in-container DB/HISHEL/autoscan settings.
    env_file:
      - ./services/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:dev@postgres:5432/saferskills_dev
      SENTRY_DSN: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      GIT_SHA: dev
      VERSION: 0.0.0-foundation
      # Shared secret matching the webapp proxy's value, so the API trusts the
      # proxy-forwarded visitor IP for per-IP rate limiting (security.md #11).
      SAFERSKILLS_PROXY_SHARED_SECRET: ${SAFERSKILLS_PROXY_SHARED_SECRET:-dev-proxy-shared-secret}
      # Phase B scan engine reads detector specs from rubric/ at startup.
      # In source-checkout layout the engine auto-discovers from the monorepo
      # root; in Docker the rubric tree is mounted read-only since it lives
      # outside the api build context (./services/api).
      RUBRIC_DIR: /app/rubric
      # The hishel RFC-9111 ingestion cache defaults to /data/.hishel.db (a Fly
      # volume mount); there is no /data volume locally and the non-root `app`
      # user can't create it, so point it at the writable home dir for compose.
      HISHEL_DB_PATH: /home/app/.hishel.db
      # The durable bulk auto-scan pipeline is ON by default everywhere (matches
      # the config.py + .env.example default). It fetches every ingested repo from
      # api.github.com — that is 60 req/h UNAUTHENTICATED, so set GITHUB_TOKEN
      # below to scan effectively (60→5,000 req/h); without it the drainer is
      # GitHub-rate-limited (it back-pressures, it does not crash). To silence bulk
      # scanning on a tokenless local box, export SCAN_AUTOSCAN_ENABLED=false in
      # your .env — the interactive POST /scans path is unaffected either way.
      SCAN_AUTOSCAN_ENABLED: ${SCAN_AUTOSCAN_ENABLED:-true}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # NOTE: mcp_registry is paused at runtime via the admin halt-source endpoint
      # (crawler_cursors.status='paused', survives restarts in pgdata) — it is a
      # ~10k-item cursor crawl that enriches every item via api.github.com
      # (60 req/h UNAUTHENTICATED), so locally it never completes and each worker
      # restart abandons it in `doing`, leaking ~1 orphaned cycle/hour. Unpause via
      # POST /api/v1/admin/sources/mcp_registry/unpause once GITHUB_TOKEN is set.
      # (INGESTION_SOURCE_BLOCKLIST is NOT used: pydantic-settings JSON-parses the
      # list[str] env before the comma-splitter, so a bare name crashes boot.)
    volumes:
      - ./rubric:/app/rubric:ro
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: saferskills-webapp
    depends_on: [api]
    environment:
      # Backend origin the in-app `/api/*` reverse proxy forwards to (server-only,
      # runtime). The browser calls same-origin `/api/*` on :5173; the webapp Node
      # server proxies it here. See webapp/src/pages/api/[...path].ts.
      API_ORIGIN: http://api:8000
      # Must match the api service's value — the proxy sends it as X-Proxy-Secret.
      SAFERSKILLS_PROXY_SHARED_SECRET: ${SAFERSKILLS_PROXY_SHARED_SECRET:-dev-proxy-shared-secret}
      # Optional Turnstile site key (empty → the scan-submit gate is skipped).
      PUBLIC_TURNSTILE_SITE_KEY: ${PUBLIC_TURNSTILE_SITE_KEY:-}
    ports: ["5173:5173"]
    healthcheck:
      # 127.0.0.1 (not localhost): inside the container `localhost` resolves to
      # IPv6 ::1, but the Node SSR server listens only on IPv4 0.0.0.0:5173, so
      # `wget localhost` gets connection-refused. Force IPv4.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:5173/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5

  # Opt-in: docker compose --profile ladle up — http://localhost:61000
  ladle:
    profiles: [ladle]
    image: node:24-alpine
    container_name: saferskills-ladle
    working_dir: /app/ui
    environment:
      # Gates `hmrHost: ''` in `.ladle/config.mjs` so Vite's HMR WS binds to 0.0.0.0
      # (host port-forward needs this; on host runs the var is unset, HMR uses defaults).
      LADLE_DOCKER: "1"
    # Pin pnpm 10 — pnpm 11 dropped reading `pnpm.onlyBuiltDependencies`
    # from package.json (moved to pnpm-workspace.yaml only).
    command: sh -c "corepack enable && corepack prepare pnpm@10.18.0 --activate && pnpm install --node-linker=hoisted && pnpm ladle:dev --host 0.0.0.0"
    volumes:
      - ./ui:/app/ui
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - ladle_node_modules:/app/ui/node_modules
    # 61000 = Ladle dev server, 24678 = Vite HMR websocket.
    ports: ["${LADLE_PORT:-61000}:61000", "24678:24678"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:61000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

volumes:
  pgdata:
  ladle_node_modules:
