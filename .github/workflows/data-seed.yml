name: tools/data-seed

on:
  pull_request:
    paths:
      - 'tools/data-seed/**'
      - '.github/workflows/data-seed.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: tools/data-seed — lint + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with: { python-version: '3.14' }
      - name: uv sync
        working-directory: tools/data-seed
        run: uv sync
      - name: Ruff check
        working-directory: tools/data-seed
        run: uv run ruff check .
      - name: Ruff format --check
        working-directory: tools/data-seed
        run: uv run ruff format --check .
      - name: --help smoke
        working-directory: tools/data-seed
        run: uv run saferskills-data-seed --help
      - name: catalog list smoke
        working-directory: tools/data-seed
        run: uv run saferskills-data-seed catalog list
