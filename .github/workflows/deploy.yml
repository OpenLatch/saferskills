name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to deploy'
        type: choice
        required: true
        default: 'both'
        options: [both, api, webapp]

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_GHCR: ghcr.io/openlatch
  REGISTRY_FLY: registry.fly.io

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.resolve.outputs.api }}
      webapp: ${{ steps.resolve.outputs.webapp }}
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            api:    [ 'services/api/**', 'schemas/**' ]
            webapp: [ 'webapp/**', 'ui/**' ]
      - id: resolve
        env:
          EVENT: ${{ github.event_name }}
          SERVICES: ${{ inputs.services }}
          FILTER_API: ${{ steps.filter.outputs.api }}
          FILTER_WEBAPP: ${{ steps.filter.outputs.webapp }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            case "$SERVICES" in
              api)    api=true;  webapp=false ;;
              webapp) api=false; webapp=true  ;;
              *)      api=true;  webapp=true  ;;
            esac
          else
            api="$FILTER_API"
            webapp="$FILTER_WEBAPP"
          fi
          echo "api=$api"       >> "$GITHUB_OUTPUT"
          echo "webapp=$webapp" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build & push (${{ matrix.service }})
    needs: detect-changes
    runs-on: ubuntu-latest
    # Scoped to the `staging` GH Environment so the per-app Fly deploy tokens
    # (`FLY_API_TOKEN_API`, `FLY_API_TOKEN_WEBAPP`) resolve here. Image bytes
    # pushed at build time are identical for staging + production (mirror
    # discipline: one image, deployed to both), so the staging env's tokens
    # are sufficient — the push permission attached to a Fly deploy token is
    # per-app, not per-env. Documented divergence from openlatch-platform,
    # which uses an org-level `FLY_API_TOKEN` at the repo level.
    environment:
      name: staging
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: services/api
            dockerfile: services/api/Dockerfile
          - service: webapp
            context: .
            dockerfile: webapp/Dockerfile
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to registry.fly.io
        uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          # Per-matrix-entry token: the api token can push to
          # `registry.fly.io/saferskills-api/*` and likewise for webapp.
          password: ${{ matrix.service == 'api' && secrets.FLY_API_TOKEN_API || secrets.FLY_API_TOKEN_WEBAPP }}

      - id: meta
        run: |
          sha=$(git rev-parse --short HEAD)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "tag=main-$sha" >> "$GITHUB_OUTPUT"

      - name: Build & push dual-registry
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.REGISTRY_GHCR }}/saferskills-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY_GHCR }}/saferskills-${{ matrix.service }}:latest
            ${{ env.REGISTRY_FLY }}/saferskills-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.sha }}
            # Build-arg name stays PUBLIC_*-prefixed (Astro/Vite requires it to
            # inline into the bundle); the value comes from the TURNSTILE_-grouped
            # GH Actions secret. Renaming the build-arg would disable the gate.
            PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_PUBLIC_SITE_KEY }}

      - uses: sigstore/cosign-installer@v3
      - name: Cosign keyless sign
        run: |
          cosign sign --yes ${{ env.REGISTRY_GHCR }}/saferskills-${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY_GHCR }}/saferskills-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.cdx.json

      - uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/saferskills-${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  deploy-staging-api:
    name: Deploy staging API
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://saferskills-api-staging.fly.dev
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SAFERSKILLS_PROXY_SHARED_SECRET: ${{ secrets.SAFERSKILLS_PROXY_SHARED_SECRET }}
        run: |
          sha=$(git rev-parse --short HEAD)
          cd services/api
          # Stage runtime secrets so the image + secrets roll is atomic (one
          # release picks up all). Skip each when unset so deploys still work
          # before the GH secret is configured. See ci-cd.md § Deployment.
          # SAFERSKILLS_PROXY_SHARED_SECRET must match the value set on the webapp
          # app — it is how the API trusts the proxy's forwarded IP (security.md #11).
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api-staging TURNSTILE_SECRET_KEY="$TURNSTILE_SECRET_KEY"
          fi
          if [ -n "$SAFERSKILLS_PROXY_SHARED_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-api-staging SAFERSKILLS_PROXY_SHARED_SECRET="$SAFERSKILLS_PROXY_SHARED_SECRET"
          fi
          flyctl deploy --config fly.staging.toml --image ${{ env.REGISTRY_FLY }}/saferskills-api:main-$sha --remote-only
          flyctl machine list --app saferskills-api-staging --json | jq -r '.[].id' | while read mid; do
            flyctl machine start --app saferskills-api-staging "$mid" || true
          done

  deploy-staging-webapp:
    name: Deploy staging webapp
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://saferskills-webapp-staging.fly.dev
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WEBAPP }}
          SAFERSKILLS_PROXY_SHARED_SECRET: ${{ secrets.SAFERSKILLS_PROXY_SHARED_SECRET }}
        run: |
          sha=$(git rev-parse --short HEAD)
          cd webapp
          # The /api/* reverse proxy sends this as `X-Proxy-Secret` so the API
          # trusts the forwarded visitor IP. It is a server-side RUNTIME secret
          # (read by the Node server, not inlined into the bundle), and must match
          # the value on the API app. Staged atomically before deploy.
          if [ -n "$SAFERSKILLS_PROXY_SHARED_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-webapp-staging SAFERSKILLS_PROXY_SHARED_SECRET="$SAFERSKILLS_PROXY_SHARED_SECRET"
          fi
          flyctl deploy --config fly.staging.toml --image ${{ env.REGISTRY_FLY }}/saferskills-webapp:main-$sha --remote-only
          flyctl machine list --app saferskills-webapp-staging --json | jq -r '.[].id' | while read mid; do
            flyctl machine start --app saferskills-webapp-staging "$mid" || true
          done

  e2e-staging:
    name: E2E smoke against staging
    needs: [deploy-staging-api, deploy-staging-webapp]
    if: always() && (needs.deploy-staging-api.result == 'success' || needs.deploy-staging-webapp.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.14" }
      - uses: astral-sh/setup-uv@v7
      - name: Run e2e doctor + smoke + homepage
        env:
          SAFERSKILLS_API_URL: https://saferskills-api-staging.fly.dev
          SAFERSKILLS_BASE_URL: https://saferskills-webapp-staging.fly.dev
        run: |
          cd tools/e2e
          uv sync
          uv run playwright install chromium
          uv run saferskills-e2e all

  # ─────────────────────────────────────────────────────────────────────
  # Production deployment is BLOCKED until SaferSkills reaches MVP state.
  # Gate: repo variable `ENABLE_PRODUCTION_DEPLOYS` must equal the literal
  # string `"true"` (set under Settings → Secrets and variables → Actions
  # → Variables). The variable is UNSET at W1, so the `if:` expression
  # evaluates to false and the prod jobs never run — even on manual
  # workflow_dispatch.
  #
  # In parallel, the prod Fly apps `saferskills-api` and `saferskills-webapp`
  # are kept in `suspended` state with zero machines (`flyctl apps
  # suspend`). Flipping the variable alone is not enough — a maintainer
  # must also `flyctl apps resume` before the first prod deploy can land.
  # Re-enable end of W2 once Track A demo-deploys an actual catalog
  # endpoint and the MVP gate is signed off.
  # ─────────────────────────────────────────────────────────────────────
  deploy-production-api:
    name: Deploy production API (gated — requires vars.ENABLE_PRODUCTION_DEPLOYS=true)
    needs: [e2e-staging]
    if: ${{ vars.ENABLE_PRODUCTION_DEPLOYS == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://saferskills-api.fly.dev
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SAFERSKILLS_PROXY_SHARED_SECRET: ${{ secrets.SAFERSKILLS_PROXY_SHARED_SECRET }}
        run: |
          sha=$(git rev-parse --short HEAD)
          cd services/api
          # Atomic image + secrets roll (one release). Skip each when unset. With
          # ENV=production the API startup guard REQUIRES the Turnstile secret —
          # set the GH secret before the first prod deploy.
          # SAFERSKILLS_PROXY_SHARED_SECRET must match the webapp app's value
          # (security.md #11). See ci-cd.md.
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api TURNSTILE_SECRET_KEY="$TURNSTILE_SECRET_KEY"
          fi
          if [ -n "$SAFERSKILLS_PROXY_SHARED_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-api SAFERSKILLS_PROXY_SHARED_SECRET="$SAFERSKILLS_PROXY_SHARED_SECRET"
          fi
          flyctl deploy --config fly.production.toml --image ${{ env.REGISTRY_FLY }}/saferskills-api:main-$sha --remote-only
          flyctl machine list --app saferskills-api --json | jq -r '.[].id' | while read mid; do
            flyctl machine start --app saferskills-api "$mid" || true
          done

  deploy-production-webapp:
    name: Deploy production webapp (gated — requires vars.ENABLE_PRODUCTION_DEPLOYS=true)
    needs: [e2e-staging]
    if: ${{ vars.ENABLE_PRODUCTION_DEPLOYS == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://saferskills.ai
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WEBAPP }}
          SAFERSKILLS_PROXY_SHARED_SECRET: ${{ secrets.SAFERSKILLS_PROXY_SHARED_SECRET }}
        run: |
          sha=$(git rev-parse --short HEAD)
          cd webapp
          # Server-side RUNTIME secret the /api/* proxy sends as `X-Proxy-Secret`
          # so the API trusts the forwarded visitor IP. Must match the API app's
          # value. Staged atomically before deploy (security.md #11).
          if [ -n "$SAFERSKILLS_PROXY_SHARED_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-webapp SAFERSKILLS_PROXY_SHARED_SECRET="$SAFERSKILLS_PROXY_SHARED_SECRET"
          fi
          flyctl deploy --config fly.production.toml --image ${{ env.REGISTRY_FLY }}/saferskills-webapp:main-$sha --remote-only
          flyctl machine list --app saferskills-webapp --json | jq -r '.[].id' | while read mid; do
            flyctl machine start --app saferskills-webapp "$mid" || true
          done
