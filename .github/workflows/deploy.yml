name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to deploy'
        type: choice
        required: true
        default: 'both'
        options: [both, api, webapp]

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_GHCR: ghcr.io/openlatch
  REGISTRY_FLY: registry.fly.io

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.resolve.outputs.api }}
      webapp: ${{ steps.resolve.outputs.webapp }}
      worker: ${{ steps.resolve.outputs.worker }}
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            api:    [ 'services/api/**', 'schemas/**', 'rubric/**' ]
            webapp: [ 'webapp/**', 'ui/**' ]
            worker: [ 'services/api/**', 'schemas/**', 'services/worker/**', 'rubric/**' ]
      - id: resolve
        env:
          EVENT: ${{ github.event_name }}
          SERVICES: ${{ inputs.services }}
          FILTER_API: ${{ steps.filter.outputs.api }}
          FILTER_WEBAPP: ${{ steps.filter.outputs.webapp }}
          FILTER_WORKER: ${{ steps.filter.outputs.worker }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            # The worker shares the API image, so it follows the `api` selection.
            case "$SERVICES" in
              api)    api=true;  webapp=false; worker=true  ;;
              webapp) api=false; webapp=true;  worker=false ;;
              *)      api=true;  webapp=true;  worker=true  ;;
            esac
          else
            api="$FILTER_API"
            webapp="$FILTER_WEBAPP"
            worker="$FILTER_WORKER"
          fi
          echo "api=$api"       >> "$GITHUB_OUTPUT"
          echo "webapp=$webapp" >> "$GITHUB_OUTPUT"
          echo "worker=$worker" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build & push (${{ matrix.service }})
    needs: detect-changes
    runs-on: ubuntu-latest
    # Scoped to the `staging` GH Environment so the per-app Fly deploy tokens
    # (`FLY_API_TOKEN_API`, `FLY_API_TOKEN_WEBAPP`) resolve here. Image bytes
    # pushed at build time are identical for staging + production (mirror
    # discipline: one image, deployed to both), so the staging env's tokens
    # are sufficient — the push permission attached to a Fly deploy token is
    # per-app, not per-env. Documented divergence from openlatch-platform,
    # which uses an org-level `FLY_API_TOKEN` at the repo level.
    environment:
      name: staging
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            # Repo-root context so the API image can COPY the repo-root rubric/
            # tree the scan engine loads at runtime (matches webapp's root context).
            context: .
            dockerfile: services/api/Dockerfile
          - service: webapp
            context: .
            dockerfile: webapp/Dockerfile
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to registry.fly.io
        uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          # Per-matrix-entry token: the api token can push to
          # `registry.fly.io/saferskills-api/*` and likewise for webapp.
          password: ${{ matrix.service == 'api' && secrets.FLY_API_TOKEN_API || secrets.FLY_API_TOKEN_WEBAPP }}

      - id: meta
        run: |
          sha=$(git rev-parse --short HEAD)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "tag=main-$sha" >> "$GITHUB_OUTPUT"
          # Subtree SHAs stamped onto the API image as RUBRIC_VERSION/ENGINE_VERSION
          # (app/scan stamps them on every scan). They change ONLY when rules / the
          # engine change, so the reconcile re-evals from stored blobs exactly then.
          echo "rubric_version=$(git rev-parse HEAD:rubric)" >> "$GITHUB_OUTPUT"
          echo "engine_version=$(git rev-parse HEAD:services/api/app/scan)" >> "$GITHUB_OUTPUT"

      - name: Build & push dual-registry
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.REGISTRY_GHCR }}/saferskills-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY_GHCR }}/saferskills-${{ matrix.service }}:latest
            ${{ env.REGISTRY_FLY }}/saferskills-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # PUBLIC_* build-args are inlined into the webapp bundle at build time
          # (Astro envPrefix). They're harmless no-ops for the api image (unknown
          # ARGs are ignored). One image is shared by staging+prod, so every value
          # here must be env-identical: the webapp Sentry DSN + the shared PostHog
          # project key both are. See ci-cd.md § Build-time public config.
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.sha }}
            RUBRIC_VERSION=${{ steps.meta.outputs.rubric_version }}
            ENGINE_VERSION=${{ steps.meta.outputs.engine_version }}
            # Build-arg name stays PUBLIC_*-prefixed (Astro/Vite requires it to
            # inline into the bundle); the value comes from the TURNSTILE_-grouped
            # GH Actions secret. Renaming the build-arg would disable the gate.
            PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_PUBLIC_SITE_KEY }}
            PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_DSN_WEBAPP }}
            PUBLIC_POSTHOG_KEY=${{ secrets.POSTHOG_PROJECT_KEY }}
            PUBLIC_POSTHOG_HOST=https://eu.i.posthog.com
          # Sentry source-map upload runs inside the webapp image build (keyed to
          # GIT_SHA). The auth token is a BuildKit secret so it never lands in an
          # image layer; the upload step no-ops when the secret is empty.
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}

      - uses: sigstore/cosign-installer@v3
      - name: Cosign keyless sign
        run: |
          cosign sign --yes ${{ env.REGISTRY_GHCR }}/saferskills-${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY_GHCR }}/saferskills-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.cdx.json

      - uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/saferskills-${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  deploy-staging-api:
    name: Deploy staging API
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://saferskills-api-staging.fly.dev
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SAFERSKILLS_PROXY_SHARED_SECRET: ${{ secrets.SAFERSKILLS_PROXY_SHARED_SECRET }}
          SAFERSKILLS_ADMIN_KEY: ${{ secrets.SAFERSKILLS_ADMIN_KEY }}
          SLACK_ALERTS_WEBHOOK_URL: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          SLACK_INVITE_URL: ${{ secrets.SLACK_INVITE_URL }}
          SAFERSKILLS_CLI_POW_SECRET: ${{ secrets.SAFERSKILLS_CLI_POW_SECRET }}
          SAFERSKILLS_AGENT_MASTER_KEY: ${{ secrets.SAFERSKILLS_AGENT_MASTER_KEY }}
          SAFERSKILLS_PACK_SIGNING_KEY: ${{ secrets.SAFERSKILLS_PACK_SIGNING_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_API }}
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          POSTHOG_SERVER_KEY: ${{ secrets.POSTHOG_SERVER_KEY }}
        run: |
          sha=$(git rev-parse --short HEAD)
          cd services/api
          # Stage runtime secrets so the image + secrets roll is atomic (one
          # release picks up all). Skip each when unset so deploys still work
          # before the GH secret is configured. See ci-cd.md § Deployment.
          # SAFERSKILLS_PROXY_SHARED_SECRET must match the value set on the webapp
          # app — it is how the API trusts the proxy's forwarded IP (security.md #11).
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api-staging TURNSTILE_SECRET_KEY="$TURNSTILE_SECRET_KEY"
          fi
          # Observability (telemetry.md). SENTRY_DSN → errors-only Sentry; the two
          # PostHog keys → server-side analytics + local feature-flag eval. All
          # optional — unset → that leg degrades to structlog-only, never a boot
          # failure. POSTHOG_HOST is non-secret ([env] in fly.staging.toml).
          if [ -n "$SENTRY_DSN" ]; then
            flyctl secrets set --stage --app saferskills-api-staging SENTRY_DSN="$SENTRY_DSN"
          fi
          if [ -n "$POSTHOG_PROJECT_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api-staging POSTHOG_PROJECT_KEY="$POSTHOG_PROJECT_KEY"
          fi
          if [ -n "$POSTHOG_SERVER_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api-staging POSTHOG_SERVER_KEY="$POSTHOG_SERVER_KEY"
          fi
          if [ -n "$SAFERSKILLS_PROXY_SHARED_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-api-staging SAFERSKILLS_PROXY_SHARED_SECRET="$SAFERSKILLS_PROXY_SHARED_SECRET"
          fi
          # SAFERSKILLS_ADMIN_KEY gates /api/v1/admin/* (env-scoped GH secret →
          # distinct value per env). Without it staging fails closed (403) since
          # ENV=staging — the keyless exemption is local-dev only.
          if [ -n "$SAFERSKILLS_ADMIN_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api-staging SAFERSKILLS_ADMIN_KEY="$SAFERSKILLS_ADMIN_KEY"
          fi
          # SLACK_ALERTS_WEBHOOK_URL is the page-tier sink for ingestion alerts
          # (framework/alerts.py). Repo-level GH secret — same value both envs.
          # Optional: unset → alerts degrade to Sentry/PostHog only, no Slack page.
          if [ -n "$SLACK_ALERTS_WEBHOOK_URL" ]; then
            flyctl secrets set --stage --app saferskills-api-staging SLACK_ALERTS_WEBHOOK_URL="$SLACK_ALERTS_WEBHOOK_URL"
          fi
          # SLACK_INVITE_URL is the /api/v1/community/slack/redirect target + the
          # health-probe input (API web tier only). A PUBLIC value delivered as a
          # repo-level GH secret — kept out of git, rotatable without a commit;
          # same value both envs. Optional: unset → the redirect 503s + the health
          # loop no-ops, never a boot failure.
          if [ -n "$SLACK_INVITE_URL" ]; then
            flyctl secrets set --stage --app saferskills-api-staging SLACK_INVITE_URL="$SLACK_INVITE_URL"
          fi
          # SAFERSKILLS_CLI_POW_SECRET is the trust anchor of the stateless CLI Proof-of-Work
          # scan-submit gate (security.md #12). Without it the API startup guard
          # hard-fails boot since ENV=staging — set the GH secret before first deploy.
          if [ -n "$SAFERSKILLS_CLI_POW_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-api-staging SAFERSKILLS_CLI_POW_SECRET="$SAFERSKILLS_CLI_POW_SECRET"
          fi
          # SAFERSKILLS_AGENT_MASTER_KEY + SAFERSKILLS_PACK_SIGNING_KEY anchor the lean
          # agent-scan crypto (per-run canaries + Ed25519 pack signing). The
          # API startup guard hard-fails boot when either is unset since ENV=staging,
          # so set both GH secrets before the first deploy. Repo-level (identical
          # across staging+prod so the single baked CLI pubkey verifies everywhere).
          if [ -n "$SAFERSKILLS_AGENT_MASTER_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api-staging SAFERSKILLS_AGENT_MASTER_KEY="$SAFERSKILLS_AGENT_MASTER_KEY"
          fi
          if [ -n "$SAFERSKILLS_PACK_SIGNING_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api-staging SAFERSKILLS_PACK_SIGNING_KEY="$SAFERSKILLS_PACK_SIGNING_KEY"
          fi
          flyctl deploy --config fly.staging.toml --image ${{ env.REGISTRY_FLY }}/saferskills-api:main-$sha --remote-only
          flyctl machine list --app saferskills-api-staging --json | jq -r '.[].id' | while read mid; do
            flyctl machine start --app saferskills-api-staging "$mid" || true
          done

  deploy-staging-worker:
    name: Deploy staging worker
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        # The worker runs the SAME image as the API (services/worker/ is config
        # only). FLY_API_TOKEN_API must be org-scoped (or be granted deploy on
        # saferskills-worker-staging + pull on registry.fly.io/saferskills-api);
        # else mint FLY_API_TOKEN_WORKER. The worker loads the same Settings, so
        # ENV=staging hard-fails boot without the four guard secrets — stage the
        # same set as the API MINUS the HTTP-route-only ADMIN_KEY / PROXY secret.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SLACK_ALERTS_WEBHOOK_URL: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          SAFERSKILLS_CLI_POW_SECRET: ${{ secrets.SAFERSKILLS_CLI_POW_SECRET }}
          SAFERSKILLS_AGENT_MASTER_KEY: ${{ secrets.SAFERSKILLS_AGENT_MASTER_KEY }}
          SAFERSKILLS_PACK_SIGNING_KEY: ${{ secrets.SAFERSKILLS_PACK_SIGNING_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_API }}
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          POSTHOG_SERVER_KEY: ${{ secrets.POSTHOG_SERVER_KEY }}
          SAFERSKILLS_INDEXNOW_KEY: ${{ secrets.SAFERSKILLS_INDEXNOW_KEY }}
          SAFERSKILLS_INDEXNOW_KEY_LOCATION: ${{ secrets.SAFERSKILLS_INDEXNOW_KEY_LOCATION }}
        run: |
          sha=$(git rev-parse --short HEAD)
          cd services/worker
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker-staging TURNSTILE_SECRET_KEY="$TURNSTILE_SECRET_KEY"
          fi
          if [ -n "$SAFERSKILLS_CLI_POW_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-worker-staging SAFERSKILLS_CLI_POW_SECRET="$SAFERSKILLS_CLI_POW_SECRET"
          fi
          if [ -n "$SAFERSKILLS_AGENT_MASTER_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker-staging SAFERSKILLS_AGENT_MASTER_KEY="$SAFERSKILLS_AGENT_MASTER_KEY"
          fi
          if [ -n "$SAFERSKILLS_PACK_SIGNING_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker-staging SAFERSKILLS_PACK_SIGNING_KEY="$SAFERSKILLS_PACK_SIGNING_KEY"
          fi
          if [ -n "$SENTRY_DSN" ]; then
            flyctl secrets set --stage --app saferskills-worker-staging SENTRY_DSN="$SENTRY_DSN"
          fi
          if [ -n "$POSTHOG_PROJECT_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker-staging POSTHOG_PROJECT_KEY="$POSTHOG_PROJECT_KEY"
          fi
          if [ -n "$POSTHOG_SERVER_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker-staging POSTHOG_SERVER_KEY="$POSTHOG_SERVER_KEY"
          fi
          if [ -n "$SLACK_ALERTS_WEBHOOK_URL" ]; then
            flyctl secrets set --stage --app saferskills-worker-staging SLACK_ALERTS_WEBHOOK_URL="$SLACK_ALERTS_WEBHOOK_URL"
          fi
          if [ -n "$SAFERSKILLS_INDEXNOW_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker-staging SAFERSKILLS_INDEXNOW_KEY="$SAFERSKILLS_INDEXNOW_KEY"
          fi
          if [ -n "$SAFERSKILLS_INDEXNOW_KEY_LOCATION" ]; then
            flyctl secrets set --stage --app saferskills-worker-staging SAFERSKILLS_INDEXNOW_KEY_LOCATION="$SAFERSKILLS_INDEXNOW_KEY_LOCATION"
          fi
          flyctl deploy --config fly.staging.toml --image ${{ env.REGISTRY_FLY }}/saferskills-api:main-$sha --remote-only
          flyctl machine list --app saferskills-worker-staging --json | jq -r '.[].id' | while read mid; do
            flyctl machine start --app saferskills-worker-staging "$mid" || true
          done

  deploy-staging-webapp:
    name: Deploy staging webapp
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://saferskills-webapp-staging.fly.dev
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WEBAPP }}
          SAFERSKILLS_PROXY_SHARED_SECRET: ${{ secrets.SAFERSKILLS_PROXY_SHARED_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_WEBAPP }}
        run: |
          sha=$(git rev-parse --short HEAD)
          cd webapp
          # The /api/* reverse proxy sends this as `X-Proxy-Secret` so the API
          # trusts the forwarded visitor IP. It is a server-side RUNTIME secret
          # (read by the Node server, not inlined into the bundle), and must match
          # the value on the API app. Staged atomically before deploy.
          if [ -n "$SAFERSKILLS_PROXY_SHARED_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-webapp-staging SAFERSKILLS_PROXY_SHARED_SECRET="$SAFERSKILLS_PROXY_SHARED_SECRET"
          fi
          # Server-side (SSR/proxy) Sentry DSN — read at RUNTIME by src/middleware.ts.
          # Same DSN baked into the browser bundle as PUBLIC_SENTRY_DSN; here it is a
          # runtime secret so the Node error path reports too. No-op when unset.
          if [ -n "$SENTRY_DSN" ]; then
            flyctl secrets set --stage --app saferskills-webapp-staging SENTRY_DSN="$SENTRY_DSN"
          fi
          flyctl deploy --config fly.staging.toml --image ${{ env.REGISTRY_FLY }}/saferskills-webapp:main-$sha --remote-only
          flyctl machine list --app saferskills-webapp-staging --json | jq -r '.[].id' | while read mid; do
            flyctl machine start --app saferskills-webapp-staging "$mid" || true
          done

  e2e-staging:
    name: E2E smoke against staging
    needs: [deploy-staging-api, deploy-staging-webapp, deploy-staging-worker]
    if: always() && (needs.deploy-staging-api.result == 'success' || needs.deploy-staging-webapp.result == 'success' || needs.deploy-staging-worker.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.14" }
      - uses: astral-sh/setup-uv@v7
      - name: Run e2e doctor + smoke + homepage
        env:
          SAFERSKILLS_API_URL: https://saferskills-api-staging.fly.dev
          SAFERSKILLS_BASE_URL: https://saferskills-webapp-staging.fly.dev
        run: |
          cd tools/e2e
          uv sync
          uv run playwright install chromium
          uv run saferskills-e2e all

  # ─────────────────────────────────────────────────────────────────────
  # Production deployment is BLOCKED until SaferSkills reaches MVP state.
  # Gate: repo variable `ENABLE_PRODUCTION_DEPLOYS` must equal the literal
  # string `"true"` (set under Settings → Secrets and variables → Actions
  # → Variables). The variable is currently UNSET, so the `if:` expression
  # evaluates to false and the prod jobs never run — even on manual
  # workflow_dispatch.
  #
  # In parallel, the prod Fly apps `saferskills-api` and `saferskills-webapp`
  # are kept in `suspended` state with zero machines (`flyctl apps
  # suspend`). Flipping the variable alone is not enough — a maintainer
  # must also `flyctl apps resume` before the first prod deploy can land.
  # Re-enable once there's an actual catalog endpoint deployed and the
  # MVP gate is signed off.
  # ─────────────────────────────────────────────────────────────────────
  deploy-production-api:
    name: Deploy production API (gated — requires vars.ENABLE_PRODUCTION_DEPLOYS=true)
    needs: [e2e-staging]
    if: ${{ vars.ENABLE_PRODUCTION_DEPLOYS == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://saferskills-api.fly.dev
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SAFERSKILLS_PROXY_SHARED_SECRET: ${{ secrets.SAFERSKILLS_PROXY_SHARED_SECRET }}
          SAFERSKILLS_ADMIN_KEY: ${{ secrets.SAFERSKILLS_ADMIN_KEY }}
          SLACK_ALERTS_WEBHOOK_URL: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          SLACK_INVITE_URL: ${{ secrets.SLACK_INVITE_URL }}
          SAFERSKILLS_CLI_POW_SECRET: ${{ secrets.SAFERSKILLS_CLI_POW_SECRET }}
          SAFERSKILLS_AGENT_MASTER_KEY: ${{ secrets.SAFERSKILLS_AGENT_MASTER_KEY }}
          SAFERSKILLS_PACK_SIGNING_KEY: ${{ secrets.SAFERSKILLS_PACK_SIGNING_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_API }}
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          POSTHOG_SERVER_KEY: ${{ secrets.POSTHOG_SERVER_KEY }}
        run: |
          sha=$(git rev-parse --short HEAD)
          cd services/api
          # Atomic image + secrets roll (one release). Skip each when unset. With
          # ENV=production the API startup guard REQUIRES the Turnstile secret —
          # set the GH secret before the first prod deploy.
          # SAFERSKILLS_PROXY_SHARED_SECRET must match the webapp app's value
          # (security.md #11). See ci-cd.md.
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api TURNSTILE_SECRET_KEY="$TURNSTILE_SECRET_KEY"
          fi
          # Observability (telemetry.md) — same legs as staging. All optional;
          # unset → that leg degrades to structlog-only, never a boot failure.
          # POSTHOG_HOST is non-secret ([env] in fly.production.toml).
          if [ -n "$SENTRY_DSN" ]; then
            flyctl secrets set --stage --app saferskills-api SENTRY_DSN="$SENTRY_DSN"
          fi
          if [ -n "$POSTHOG_PROJECT_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api POSTHOG_PROJECT_KEY="$POSTHOG_PROJECT_KEY"
          fi
          if [ -n "$POSTHOG_SERVER_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api POSTHOG_SERVER_KEY="$POSTHOG_SERVER_KEY"
          fi
          if [ -n "$SAFERSKILLS_PROXY_SHARED_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-api SAFERSKILLS_PROXY_SHARED_SECRET="$SAFERSKILLS_PROXY_SHARED_SECRET"
          fi
          # SAFERSKILLS_ADMIN_KEY gates /api/v1/admin/* (env-scoped GH secret →
          # distinct value per env). Without it production fails closed (403) since
          # ENV=production — the keyless exemption is local-dev only.
          if [ -n "$SAFERSKILLS_ADMIN_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api SAFERSKILLS_ADMIN_KEY="$SAFERSKILLS_ADMIN_KEY"
          fi
          # SLACK_ALERTS_WEBHOOK_URL is the page-tier sink for ingestion alerts
          # (framework/alerts.py). Repo-level GH secret — same value both envs.
          # Optional: unset → alerts degrade to Sentry/PostHog only, no Slack page.
          if [ -n "$SLACK_ALERTS_WEBHOOK_URL" ]; then
            flyctl secrets set --stage --app saferskills-api SLACK_ALERTS_WEBHOOK_URL="$SLACK_ALERTS_WEBHOOK_URL"
          fi
          # SLACK_INVITE_URL is the /api/v1/community/slack/redirect target + the
          # health-probe input (API web tier only). A PUBLIC value delivered as a
          # repo-level GH secret — kept out of git, rotatable without a commit;
          # same value both envs. Optional: unset → the redirect 503s + the health
          # loop no-ops, never a boot failure.
          if [ -n "$SLACK_INVITE_URL" ]; then
            flyctl secrets set --stage --app saferskills-api SLACK_INVITE_URL="$SLACK_INVITE_URL"
          fi
          # SAFERSKILLS_CLI_POW_SECRET anchors the stateless CLI Proof-of-Work scan-submit gate
          # (security.md #12). With ENV=production the API startup guard REQUIRES it —
          # set the GH secret before the first prod deploy.
          if [ -n "$SAFERSKILLS_CLI_POW_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-api SAFERSKILLS_CLI_POW_SECRET="$SAFERSKILLS_CLI_POW_SECRET"
          fi
          # SAFERSKILLS_AGENT_MASTER_KEY + SAFERSKILLS_PACK_SIGNING_KEY anchor the lean
          # agent-scan crypto. The API startup guard hard-fails boot when either
          # is unset since ENV=production, so set both GH secrets before the first prod
          # deploy. Repo-level (identical across staging+prod so the single baked CLI
          # pubkey verifies everywhere).
          if [ -n "$SAFERSKILLS_AGENT_MASTER_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api SAFERSKILLS_AGENT_MASTER_KEY="$SAFERSKILLS_AGENT_MASTER_KEY"
          fi
          if [ -n "$SAFERSKILLS_PACK_SIGNING_KEY" ]; then
            flyctl secrets set --stage --app saferskills-api SAFERSKILLS_PACK_SIGNING_KEY="$SAFERSKILLS_PACK_SIGNING_KEY"
          fi
          flyctl deploy --config fly.production.toml --image ${{ env.REGISTRY_FLY }}/saferskills-api:main-$sha --remote-only
          flyctl machine list --app saferskills-api --json | jq -r '.[].id' | while read mid; do
            flyctl machine start --app saferskills-api "$mid" || true
          done

  deploy-production-worker:
    name: Deploy production worker (gated — requires vars.ENABLE_PRODUCTION_DEPLOYS=true)
    needs: [e2e-staging]
    if: ${{ vars.ENABLE_PRODUCTION_DEPLOYS == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        # Same image as the production API (services/worker/ is config only). The
        # saferskills-worker app is created suspended and stays so until MVP. Same
        # boot-guard secret set as the API MINUS the HTTP-route-only ones.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SLACK_ALERTS_WEBHOOK_URL: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          SAFERSKILLS_CLI_POW_SECRET: ${{ secrets.SAFERSKILLS_CLI_POW_SECRET }}
          SAFERSKILLS_AGENT_MASTER_KEY: ${{ secrets.SAFERSKILLS_AGENT_MASTER_KEY }}
          SAFERSKILLS_PACK_SIGNING_KEY: ${{ secrets.SAFERSKILLS_PACK_SIGNING_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_API }}
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          POSTHOG_SERVER_KEY: ${{ secrets.POSTHOG_SERVER_KEY }}
          SAFERSKILLS_INDEXNOW_KEY: ${{ secrets.SAFERSKILLS_INDEXNOW_KEY }}
          SAFERSKILLS_INDEXNOW_KEY_LOCATION: ${{ secrets.SAFERSKILLS_INDEXNOW_KEY_LOCATION }}
        run: |
          sha=$(git rev-parse --short HEAD)
          cd services/worker
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker TURNSTILE_SECRET_KEY="$TURNSTILE_SECRET_KEY"
          fi
          if [ -n "$SAFERSKILLS_CLI_POW_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-worker SAFERSKILLS_CLI_POW_SECRET="$SAFERSKILLS_CLI_POW_SECRET"
          fi
          if [ -n "$SAFERSKILLS_AGENT_MASTER_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker SAFERSKILLS_AGENT_MASTER_KEY="$SAFERSKILLS_AGENT_MASTER_KEY"
          fi
          if [ -n "$SAFERSKILLS_PACK_SIGNING_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker SAFERSKILLS_PACK_SIGNING_KEY="$SAFERSKILLS_PACK_SIGNING_KEY"
          fi
          if [ -n "$SENTRY_DSN" ]; then
            flyctl secrets set --stage --app saferskills-worker SENTRY_DSN="$SENTRY_DSN"
          fi
          if [ -n "$POSTHOG_PROJECT_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker POSTHOG_PROJECT_KEY="$POSTHOG_PROJECT_KEY"
          fi
          if [ -n "$POSTHOG_SERVER_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker POSTHOG_SERVER_KEY="$POSTHOG_SERVER_KEY"
          fi
          if [ -n "$SLACK_ALERTS_WEBHOOK_URL" ]; then
            flyctl secrets set --stage --app saferskills-worker SLACK_ALERTS_WEBHOOK_URL="$SLACK_ALERTS_WEBHOOK_URL"
          fi
          if [ -n "$SAFERSKILLS_INDEXNOW_KEY" ]; then
            flyctl secrets set --stage --app saferskills-worker SAFERSKILLS_INDEXNOW_KEY="$SAFERSKILLS_INDEXNOW_KEY"
          fi
          if [ -n "$SAFERSKILLS_INDEXNOW_KEY_LOCATION" ]; then
            flyctl secrets set --stage --app saferskills-worker SAFERSKILLS_INDEXNOW_KEY_LOCATION="$SAFERSKILLS_INDEXNOW_KEY_LOCATION"
          fi
          flyctl deploy --config fly.production.toml --image ${{ env.REGISTRY_FLY }}/saferskills-api:main-$sha --remote-only
          flyctl machine list --app saferskills-worker --json | jq -r '.[].id' | while read mid; do
            flyctl machine start --app saferskills-worker "$mid" || true
          done

  deploy-production-webapp:
    name: Deploy production webapp (gated — requires vars.ENABLE_PRODUCTION_DEPLOYS=true)
    needs: [e2e-staging]
    if: ${{ vars.ENABLE_PRODUCTION_DEPLOYS == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://saferskills.ai
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WEBAPP }}
          SAFERSKILLS_PROXY_SHARED_SECRET: ${{ secrets.SAFERSKILLS_PROXY_SHARED_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_WEBAPP }}
        run: |
          sha=$(git rev-parse --short HEAD)
          cd webapp
          # Server-side RUNTIME secret the /api/* proxy sends as `X-Proxy-Secret`
          # so the API trusts the forwarded visitor IP. Must match the API app's
          # value. Staged atomically before deploy (security.md #11).
          if [ -n "$SAFERSKILLS_PROXY_SHARED_SECRET" ]; then
            flyctl secrets set --stage --app saferskills-webapp SAFERSKILLS_PROXY_SHARED_SECRET="$SAFERSKILLS_PROXY_SHARED_SECRET"
          fi
          # Server-side (SSR/proxy) Sentry DSN — read at RUNTIME by src/middleware.ts.
          # No-op when unset. See security.md / telemetry.md.
          if [ -n "$SENTRY_DSN" ]; then
            flyctl secrets set --stage --app saferskills-webapp SENTRY_DSN="$SENTRY_DSN"
          fi
          flyctl deploy --config fly.production.toml --image ${{ env.REGISTRY_FLY }}/saferskills-webapp:main-$sha --remote-only
          flyctl machine list --app saferskills-webapp --json | jq -r '.[].id' | while read mid; do
            flyctl machine start --app saferskills-webapp "$mid" || true
          done
