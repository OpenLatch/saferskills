name: PR title lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  conventional:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - name: Check PR title is Conventional Commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        # Inline regex check — same Conventional-Commits contract the
        # pre-commit `conventional-pre-commit` hook enforces locally.
        # Replaces `amannn/action-semantic-pull-request@v5` which posted
        # a duplicate `action-semantic-pull-request` commit-status that
        # stuck in PENDING and added noise to PR check rollups without
        # being a branch-protection-required check.
        #
        # The description is NOT case-restricted: Conventional Commits
        # (and `conventional-pre-commit`) do not mandate a lowercase
        # subject, so a leading-`[a-z]` requirement wrongly rejected valid
        # titles like Dependabot's `chore(deps): Bump the <group> ...`.
        # Only a non-empty description after `: ` is required.
        run: |
          if ! printf '%s' "$PR_TITLE" | grep -qE '^(feat|fix|chore|docs|refactor|test|build|ci|perf|style|revert)(\([^)]+\))?!?: .+$'; then
            echo "::error::PR title is not a valid Conventional Commits message."
            echo "  got:      $PR_TITLE"
            echo "  expected: <type>(<scope>)?: <description>"
            echo "  types:    feat, fix, chore, docs, refactor, test, build, ci, perf, style, revert"
            exit 1
          fi
