# Dependabot config — mirrors openlatch-platform.
# Covers all dep ecosystems: npm (root + webapp), pip (services/api +
# tools/e2e), docker, and github-actions. Weekly Monday bumps, grouped by
# update type so the PR queue stays small.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "area/ci"]
    groups:
      frontend-minor-patch:
        update-types: ["minor", "patch"]
      frontend-major:
        update-types: ["major"]

  - package-ecosystem: "pip"
    directory: "/services/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "area/api"]
    groups:
      api-minor-patch:
        update-types: ["minor", "patch"]
      api-major:
        update-types: ["major"]

  - package-ecosystem: "pip"
    directory: "/tools/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels: ["dependencies", "area/e2e"]
    groups:
      e2e-all:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "area/ci"]
    groups:
      docker-all:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "area/ci"]
    groups:
      gha-all:
        patterns: ["*"]
