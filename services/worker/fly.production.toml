# SaferSkills ingestion/scan worker — production.
#
# Config-only deploy unit (see fly.staging.toml + README.md). Same image as the
# API, deployed by deploy.yml with `python -m app.worker_main`. Production deploys
# are gated off until MVP (ENABLE_PRODUCTION_DEPLOYS) and the app is kept suspended
# with zero machines, mirroring saferskills-api / saferskills-webapp.

app = "saferskills-worker"
primary_region = "iad"

[deploy]
strategy = "immediate"

[processes]
app = "python -m app.worker_main"

[env]
VERSION = "0.0.0-foundation"
ENV = "production"
LOG_LEVEL = "INFO"
HISHEL_DB_PATH = "/home/app/.hishel.db"
OTEL_EXPORTER_OTLP_ENDPOINT = "http://openlatch-observability.internal:4318"
OTEL_EXPORTER_OTLP_PROTOCOL = "http/protobuf"
OTEL_SERVICE_NAME = "saferskills-worker"
POSTHOG_HOST = "https://eu.i.posthog.com"
INGESTION_WORKER_ENABLED = "true"
# Production has more headroom than staging; start conservative and size up with
# real load (the worker is a single process, easy to scale memory/concurrency).
SCAN_MAX_CONCURRENCY = "4"
INGESTION_WORKER_CONCURRENCY = "4"
DB_POOL_SIZE = "5"
DB_MAX_OVERFLOW = "5"

[[restart]]
policy = "always"

[[vm]]
size = "shared-cpu-2x"
memory = "1024mb"
cpu_kind = "shared"
cpus = 2
