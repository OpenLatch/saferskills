app = "saferskills-api"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[deploy]
strategy = "canary"

[env]
PORT = "8000"
VERSION = "0.0.0-foundation"
ENV = "production"
LOG_LEVEL = "INFO"
# Hishel ingestion HTTP cache path. The API machine mounts no Fly volume, so the
# config default (/data/.hishel.db) is unwritable (non-root `app` user → Permission
# denied) and every adapter cycle fails before fetching. Point it at the app-owned
# home dir — an ephemeral per-machine HTTP cache is fine (warms again after deploy).
HISHEL_DB_PATH = "/home/app/.hishel.db"
# OpenTelemetry traces → the shared Grafana Vector over 6PN internal DNS (same
# Fly org). Logs already flow via the Fly NATS drain; only traces need this
# endpoint. Metrics are deferred (no metric exporter wired yet). See telemetry.md.
OTEL_EXPORTER_OTLP_ENDPOINT = "http://openlatch-observability.internal:4318"
OTEL_EXPORTER_OTLP_PROTOCOL = "http/protobuf"
OTEL_SERVICE_NAME = "saferskills-api"
POSTHOG_HOST = "https://eu.i.posthog.com"
# The deployed worker runs as its own process (services/worker/, the same image
# with `python -m app.worker_main`), so the API tier does NOT run the in-process
# Procrastinate worker — it stays a lean web process. The connector is still
# opened (main.py) so the API's own defer paths work. Local dev + docker-compose
# keep the default (true) → `docker compose up` runs everything in one process.
INGESTION_WORKER_ENABLED = "false"
# Community Slack invite health-probe interval (6h). The invite URL itself
# (SLACK_INVITE_URL — the /slack redirect target) is a PUBLIC never-expire link
# but is delivered as a SECRET: staged via `flyctl secrets set --stage` in
# deploy.yml (API apps) from the repo-level GH secret SLACK_INVITE_URL, so the
# join link stays out of git + is rotatable without a commit. Unset → the
# redirect 503s + the health loop no-ops.
SLACK_INVITE_HEALTH_INTERVAL_SECONDS = "21600"
# Non-secret runtime config only. `SAFERSKILLS_PROXY_SHARED_SECRET` (the
# trusted-proxy token read by scans.py::_rate_limit_ip) is a SECRET — staged via
# `flyctl secrets set --stage` in deploy.yml, never committed here. See ci-cd.md.

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/api/v1/health"
timeout = "5s"

[[vm]]
size = "shared-cpu-2x"
memory = "1024mb"
cpu_kind = "shared"
cpus = 2
