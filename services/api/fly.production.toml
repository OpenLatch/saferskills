app = "saferskills-api"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[deploy]
strategy = "canary"

[env]
PORT = "8000"
VERSION = "0.0.0-foundation"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/api/v1/health"
timeout = "5s"

[[vm]]
size = "shared-cpu-2x"
memory = "1024mb"
cpu_kind = "shared"
cpus = 2
