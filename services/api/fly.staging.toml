app = "saferskills-api-staging"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[deploy]
strategy = "rolling"

[env]
PORT = "8000"
VERSION = "0.0.0-foundation"
# Non-secret runtime config only. `SAFERSKILLS_PROXY_SHARED_SECRET` (the
# trusted-proxy token read by scans.py::_rate_limit_ip) is a SECRET — staged via
# `flyctl secrets set --stage` in deploy.yml, never committed here. See ci-cd.md.

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/api/v1/health"
timeout = "5s"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
cpu_kind = "shared"
cpus = 1
