# Official MCP Registry poll (registry.modelcontextprotocol.io). Hourly.
name: mcp_registry
kind: api
hosts:
  - registry.modelcontextprotocol.io
  # GitHub hosts for the enrich() pass: the /v0/servers feed carries no repo
  # signals (stars, commit count, manifest), so every server would classify as
  # quality_tier='empty' and be hidden by the default catalog gate. enrich()
  # fetches repo facts + manifest/README so registry servers tier properly.
  - api.github.com
  - raw.githubusercontent.com
cadence_cron: "0 * * * *"
rate_limit_per_second: 2.0
queue: ingest_mcp_registry
enabled: true
registry_id: mcp_registry
discovery:
  api_base: https://registry.modelcontextprotocol.io
  servers_path: /v0/servers
  page_limit: 100
description: Polls the official MCP Registry /v0/servers feed by updated_since cursor.
policy:
  summary: >-
    We poll the official MCP Registry hourly via its documented API and credit
    every listing with a backlink. We respect its rate limits.
  contact: bot@saferskills.ai
  robots_txt: n/a (documented API)
