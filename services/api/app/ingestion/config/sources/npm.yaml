# npm replication _changes stream, filtered to MCP/skill package-name patterns. Hourly.
name: npm
kind: api
hosts:
  - replicate.npmjs.com
  - registry.npmjs.com
  - api.npmjs.org
cadence_cron: "0 * * * *"
rate_limit_per_second: 5.0
queue: ingest_npm
enabled: true
discovery:
  changes_url: https://replicate.npmjs.com/_changes
  name_prefixes: ["mcp-server-", "claude-skill-", "@modelcontextprotocol/"]
  max_items_per_cycle: 5000
description: Streams the npm _changes feed, keeping only MCP-server / claude-skill packages.
policy:
  summary: >-
    We stream the public npm replication feed and index only packages whose name
    matches a documented MCP/skill prefix. Each item links back to npmjs.com.
  contact: bot@saferskills.ai
  robots_txt: n/a (documented replication API)
