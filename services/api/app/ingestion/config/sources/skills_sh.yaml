# skills.sh skill aggregator. Sitemap-index → skills child →
# /<owner>/skills/<name> item pages (Vercel; redirects apex → www). The owner
# segment is the GitHub org; the item page links the repo, read from the page.
name: skills_sh
kind: scrape
hosts:
  - skills.sh
  - www.skills.sh
  - api.github.com
  - raw.githubusercontent.com
cadence_cron: "45 4 * * *"
rate_limit_per_second: 1.0
queue: ingest_aggregator
enabled: true
registry_id: skills_sh
discovery:
  sitemap_url: https://www.skills.sh/sitemap.xml
  item_sitemap_substr: [skills]
  item_url_regex: "skills\\.sh/[^/]+/skills/[^/]+$"
  kind: skill
  name_from: og_title
  max_items: 200
description: Scrapes public skill listings from skills.sh via its sitemap, crediting each item with a backlink.
policy:
  summary: >-
    We index public skill listings from skills.sh via its sitemap, paraphrase
    each listing, credit every item with a backlink, and respect robots.txt + a
    conservative rate limit.
  contact: bot@saferskills.ai
  robots_txt: respected
