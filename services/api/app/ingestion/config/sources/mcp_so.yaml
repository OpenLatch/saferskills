# mcp.so MCP-server aggregator (I-04 Phase B PR2). Sitemap-driven HTML scrape via
# curl_cffi (Cloudflare-proxied). og tags are generic, so the name comes from the
# URL slug (/server/<name>/<author>, index -2); the GitHub repo is read from the
# item page (the site's own repo chatmcp/mcpso is denylisted).
name: mcp_so
kind: scrape
hosts:
  - mcp.so
  - api.github.com
  - raw.githubusercontent.com
cadence_cron: "45 3 * * *"
rate_limit_per_second: 1.0
queue: ingest_aggregator
enabled: true
registry_id: mcp_so
discovery:
  sitemap_url: https://mcp.so/sitemap.xml
  item_sitemap_substr: [projects]
  item_url_regex: "mcp\\.so/(server|client)/[^/]+/[^/]+$"
  kind: mcp_server
  name_from: slug
  name_slug_index: -2
  github_denylist: [chatmcp/mcpso]
  max_items: 150
description: Scrapes public MCP-server listings from mcp.so via its sitemap, crediting each item with a backlink.
policy:
  summary: >-
    We index public MCP-server listings from mcp.so via its sitemap, paraphrase
    each listing, credit every item with a backlink, and respect robots.txt + a
    conservative rate limit.
  contact: bot@saferskills.ai
  robots_txt: respected
