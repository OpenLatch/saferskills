# glama.ai MCP-server aggregator. Feed-first via the public REST API
# (glama.ai/api/mcp/v1/servers, Relay cursor, no auth). Records carry repository.url
# (GitHub), so enrich() tiers most items to medium/high — the catalog-growth driver.
name: glama
kind: scrape
hosts:
  # The JSON feed + the HTML listing fallback + the backlink host.
  - glama.ai
  # GitHub hosts for the enrich() pass (repo facts + manifests).
  - api.github.com
  - raw.githubusercontent.com
cadence_cron: "30 3 * * *"
rate_limit_per_second: 1.0
queue: ingest_aggregator
enabled: true
registry_id: glama
discovery:
  feed_url: https://glama.ai/api/mcp/v1/servers
  listing_url: https://glama.ai/mcp/servers
  page_size: 100
  max_pages: 100
description: Indexes public MCP-server listings from the Glama registry API, crediting each item with a backlink.
policy:
  summary: >-
    We poll the public Glama MCP registry API daily, paraphrase each listing's
    description, credit every item with a backlink, and respect its rate limits
    and robots.txt.
  contact: bot@saferskills.ai
  robots_txt: respected
