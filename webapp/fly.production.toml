app = "saferskills-webapp"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[deploy]
strategy = "canary"

[env]
# Backend origin the in-app `/api/*` reverse proxy forwards to (server-only,
# runtime — NOT a `PUBLIC_*` build-arg, so prod and staging share one image but
# point at different APIs without a rebuild). Prod = staging config, different
# domain. See webapp/src/pages/api/[...path].ts + environment-config.md.
API_ORIGIN = "https://saferskills-api.fly.dev"

[http_service]
internal_port = 5173
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "5s"
interval = "30s"
method = "GET"
path = "/"
timeout = "3s"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
cpu_kind = "shared"
cpus = 1
