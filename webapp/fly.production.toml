app = "saferskills-webapp"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[deploy]
strategy = "canary"

[http_service]
internal_port = 80
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "5s"
interval = "30s"
method = "GET"
path = "/"
timeout = "3s"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
cpu_kind = "shared"
cpus = 1
