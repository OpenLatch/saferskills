<svg width="800" height="520" viewBox="0 0 800 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="520" fill="#FFFFFF"/>

  <!-- Title block -->
  <text x="40" y="52" font-family="Crimson Pro, Georgia, serif" font-size="32" font-weight="600" fill="#0A0A0A" letter-spacing="-0.01em">Typography</text>
  <text x="40" y="78" font-family="Manrope, sans-serif" font-size="14" fill="#5A5A5F">SaferSkills Brand System — Crimson Pro / Manrope / JetBrains Mono</text>

  <line x1="40" y1="100" x2="760" y2="100" stroke="#DCDCE0" stroke-width="1"/>

  <!-- Hero (display) — Crimson Pro 56 -->
  <text x="40" y="155" font-family="Crimson Pro, Georgia, serif" font-size="56" font-weight="700" fill="#0A0A0A" letter-spacing="-0.02em">SaferSkills</text>
  <text x="500" y="155" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5F">Hero · 56 / Bold / -0.02em</text>

  <!-- H1 — 36 -->
  <text x="40" y="205" font-family="Crimson Pro, Georgia, serif" font-size="36" font-weight="600" fill="#0A0A0A" letter-spacing="-0.01em">Heading One</text>
  <text x="500" y="205" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5F">H1 · 36 / Semibold / 1.2</text>

  <!-- H2 — 28 -->
  <text x="40" y="245" font-family="Crimson Pro, Georgia, serif" font-size="28" font-weight="600" fill="#0A0A0A" letter-spacing="-0.01em">Heading Two</text>
  <text x="500" y="245" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5F">H2 · 28 / Semibold / 1.25</text>

  <!-- H3 — 22 -->
  <text x="40" y="280" font-family="Crimson Pro, Georgia, serif" font-size="22" font-weight="600" fill="#0A0A0A" letter-spacing="-0.01em">Heading Three</text>
  <text x="500" y="280" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5F">H3 · 22 / Semibold / 1.3</text>

  <!-- Body — Manrope 16 -->
  <text x="40" y="320" font-family="Manrope, sans-serif" font-size="16" font-weight="400" fill="#0A0A0A">Body text for paragraphs, methodology pages, scan-result rationale.</text>
  <text x="500" y="320" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5F">Body · 16 / Regular / 1.5</text>

  <!-- Body small — Manrope 14 -->
  <text x="40" y="350" font-family="Manrope, sans-serif" font-size="14" font-weight="400" fill="#5A5A5F">Secondary text — metadata, timestamps, rule_id reference rows.</text>
  <text x="500" y="350" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5F">Body sm · 14 / Regular / 1.5</text>

  <!-- Overline / Label — Manrope 12 uppercase -->
  <text x="40" y="378" font-family="Manrope, sans-serif" font-size="12" font-weight="600" fill="#5A5A5F" letter-spacing="0.05em">OVERLINE LABEL — TABLE HEADERS, KICKERS</text>
  <text x="500" y="378" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5F">Overline · 12 / Semibold / 0.05em</text>

  <!-- Code — JetBrains Mono 14 -->
  <rect x="40" y="395" width="430" height="32" fill="#F5F5F7"/>
  <text x="52" y="417" font-family="JetBrains Mono, monospace" font-size="14" fill="#0A0A0A">rule_id: SS-MCP-POISON-UNICODE-01</text>
  <text x="500" y="417" font-family="JetBrains Mono, monospace" font-size="12" fill="#5A5A5F">Code · 14 / Regular</text>

  <!-- Font families callout (cobalt tint) -->
  <rect x="580" y="120" width="180" height="115" fill="#EFF6FF" stroke="#1E40AF" stroke-width="1"/>
  <text x="600" y="145" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#1E40AF" letter-spacing="0.05em">FONT FAMILIES</text>
  <text x="600" y="170" font-family="Crimson Pro, serif" font-size="14" font-weight="600" fill="#1E40AF">Display: Crimson Pro</text>
  <text x="600" y="192" font-family="Manrope, sans-serif" font-size="13" fill="#1E40AF">Body: Manrope</text>
  <text x="600" y="214" font-family="JetBrains Mono, monospace" font-size="13" fill="#1E40AF">Code: JetBrains Mono</text>

  <!-- Self-hosted note -->
  <rect x="40" y="455" width="720" height="50" fill="#F5F5F7"/>
  <text x="52" y="476" font-family="Manrope, sans-serif" font-size="12" font-weight="600" fill="#0A0A0A">All fonts self-hosted via @fontsource/{crimson-pro,manrope,jetbrains-mono}.</text>
  <text x="52" y="494" font-family="Manrope, sans-serif" font-size="12" fill="#5A5A5F">Never CDN-hosted — no third-party network at runtime, reduces tracking surface.</text>
</svg>
