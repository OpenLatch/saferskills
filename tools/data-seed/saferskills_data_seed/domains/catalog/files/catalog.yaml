# SaferSkills fixture catalog corpus.
#
# D-FE-14: ~50 real-named items spanning all 5 PRD categories
# (skill / mcp_server / hooks / plugin / rules). Score distribution targets
# ~25 green ≥80, ~15 yellow 60-79, ~7 orange 40-59, ~3 red <40 so every band
# is visible on /catalog. Use `saferskills-data-seed catalog publish` to
# POST one scan per entry.
#
# A1 ships with 8 representative entries to prove the structure. The full
# 50-entry corpus lands in a follow-up PR (separate from the I-03 design-system
# foundation — keeps A1 reviewable).

items:
  # ---- skill ----
  - slug: anthropics--claude-pdf
    kind: skill
    display_name: claude-pdf
    github_url: https://github.com/anthropics/skills/tree/main/pdf
    description: Read and extract structured content from PDFs.
    expected_score: 95
    listed_on: [anthropics-skills, mcp.so]
    vendor_response: null

  - slug: anthropics--claude-figma
    kind: skill
    display_name: claude-figma
    github_url: https://github.com/anthropics/skills/tree/main/figma
    description: Read and apply changes to Figma designs.
    expected_score: 89
    listed_on: [anthropics-skills]
    vendor_response: null

  # ---- mcp_server ----
  - slug: modelcontextprotocol--github-mcp
    kind: mcp_server
